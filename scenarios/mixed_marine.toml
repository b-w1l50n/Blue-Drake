schema_version = 1
name = "mixed-marine-foundation"
duration_s = 2.0
time_step_s = 0.005
gravity_mps2 = 9.81
water_density_kg_m3 = 1025.0
air_density_kg_m3 = 1.225
surface_pressure_Pa = 101325.0
water_temperature_C = 12.0
seafloor_z_W_m = -20.0
world_extent_m = 80.0

[network]
modem = "divenet-sealink-3km-oem"
sound_speed_mps = 1500.0

[[network.transmissions]]
id = "surface-to-rov"
source = "surface_1"
destination = "rov_1"
start_time_s = 0.1
payload_bytes = 16
code_channel = 0

[[network.transmissions]]
id = "rov-to-surface"
source = "rov_1"
destination = "surface_1"
start_time_s = 0.6
payload_bytes = 16
code_channel = 0

[[network.transmissions]]
id = "uuv-to-surface"
source = "uuv_1"
destination = "surface_1"
start_time_s = 1.0
payload_bytes = 16
code_channel = 1

[[network.transmissions]]
id = "glider-to-surface"
source = "glider_1"
destination = "surface_1"
start_time_s = 1.0
payload_bytes = 16
code_channel = 1

[[vehicles]]
id = "surface_1"
preset = "usv"
position_W_m = [-3.0, -2.0, 0.0]
wind_velocity_W_mps = [2.0, 0.0, 0.0]
wrench_command_B = [0.0, 0.0, 0.0, 8.0, 0.0, 0.0]

[[vehicles.sensors]]
id = "attitude"
profile = "xsens-avior-ahrs"

[[vehicles.sensors]]
id = "bathymetry"
profile = "cerulean-surveyor-240-16"
rpy_BS_deg = [0.0, 90.0, 0.0]

[[vehicles]]
id = "rov_1"
preset = "rov"
position_W_m = [-2.5, 1.5, -2.0]
water_current_W_mps = [0.05, -0.02, 0.0]

[[vehicles.sensors]]
id = "depth"
profile = "blue-robotics-bar30"
position_B_m = [0.0, 0.0, 0.1]

[[vehicles.sensors]]
id = "attitude"
profile = "xsens-mti-630r"

[[vehicles.sensors]]
id = "altimeter"
profile = "blue-robotics-ping-sonar"
rpy_BS_deg = [0.0, 90.0, 0.0]

[[vehicles]]
id = "uuv_1"
preset = "uuv"
position_W_m = [2.5, -1.5, -3.0]
wrench_command_B = [0.0, 0.0, 0.0, 10.0, 0.0, 0.0]

[[vehicles.sensors]]
id = "attitude"
profile = "xsens-mti-630r"

[[vehicles.sensors]]
id = "forward_sonar"
profile = "cerulean-omniscan-450fs-300m"

[[vehicles]]
id = "glider_1"
preset = "glider"
position_W_m = [2.5, 2.0, -2.5]
rpy_deg = [0.0, -8.0, 180.0]
glider_command = [-2.0, 0.0]

[[vehicles.sensors]]
id = "depth"
profile = "blue-robotics-bar02"

[[vehicles.sensors]]
id = "attitude"
profile = "xsens-mti-630r"
